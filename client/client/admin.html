<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leago Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; padding: 20px; color: #0b1120; }
    .container { max-width: 1600px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 2rem; font-weight: 700; }
    .header .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .header .actions .admin-email { color: #6b7280; font-size: 0.9rem; }
    .header .btn-export { padding: 8px 20px; background: #22c55e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .header .btn-export:hover { background: #16a34a; }
    .header .logout-btn { padding: 8px 20px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .header .logout-btn:hover { background: #dc2626; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px 16px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: center; }
    .stat-card .number { font-size: 2.2rem; font-weight: 800; color: #6366f1; }
    .stat-card .label { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }
    .stat-card .number.banned { color: #ef4444; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-box { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .chart-box h3 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
    .chart-box canvas { max-height: 180px; max-width: 100%; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }
    .panel { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .panel .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .panel .panel-header h2 { font-size: 1.1rem; font-weight: 700; }
    .panel .panel-header .badge { font-size: 0.7rem; padding: 2px 10px; border-radius: 12px; background: #eef2ff; color: #6366f1; }
    .panel .panel-header .badge.live { background: #d1fae5; color: #065f46; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .panel .list-item { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .panel .list-item:hover { background: #f8fafc; }
    .panel .list-item .email { font-weight: 500; font-size: 0.9rem; }
    .panel .list-item .date { font-size: 0.75rem; color: #6b7280; }
    .panel .list-item .badge-role { font-size: 0.65rem; padding: 2px 10px; border-radius: 12px; background: #eef2ff; color: #6366f1; }
    .panel .list-item .badge-role.admin { background: #fef3c7; color: #92400e; }
    .panel .list-item .badge-role.banned { background: #fee2e2; color: #991b1b; }
    .panel .list-item .btn-ban { padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 600; }
    .panel .list-item .btn-ban.ban { background: #fee2e2; color: #991b1b; }
    .panel .list-item .btn-ban.ban:hover { background: #fecaca; }
    .panel .list-item .btn-ban.unban { background: #d1fae5; color: #065f46; }
    .panel .list-item .btn-ban.unban:hover { background: #a7f3d0; }
    .chat-view { margin-top: 12px; max-height: 400px; overflow-y: auto; background: #f8fafc; border-radius: 12px; padding: 12px; }
    .chat-view .msg { padding: 8px 12px; margin-bottom: 6px; border-radius: 8px; font-size: 0.9rem; }
    .chat-view .msg.user { background: #eef2ff; color: #0b1120; }
    .chat-view .msg.assistant { background: #e5e7eb; color: #0b1120; }
    .chat-view .msg .role-label { font-weight: 600; font-size: 0.7rem; color: #6b7280; }
    .back-btn { padding: 6px 16px; background: #e5e7eb; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; margin-bottom: 12px; font-size: 0.85rem; }
    .back-btn:hover { background: #d1d5db; }
    .loading { text-align: center; color: #6b7280; padding: 40px; }
    .error-message { background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .error-message.show { display: block; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #0b1120; color: white; padding: 12px 24px; border-radius: 12px; font-size: 0.9rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); opacity: 0; transform: translateY(20px); transition: all 0.3s ease; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .empty-state { text-align: center; padding: 30px; color: #6b7280; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="header">
      <h1>🧠 Leago Admin</h1>
      <div class="actions">
        <span class="admin-email" id="adminEmail"></span>
        <button class="btn-export" onclick="exportChats()">📥 Export CSV</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="error-message" id="errorMessage"></div>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="number" id="totalUsers">-</div><div class="label">Total Users</div></div>
      <div class="stat-card"><div class="number" id="totalMessages">-</div><div class="label">Total Messages</div></div>
      <div class="stat-card"><div class="number" id="activeUsers">-</div><div class="label">Active (7d)</div></div>
      <div class="stat-card"><div class="number banned" id="bannedUsers">-</div><div class="label">Banned Users</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-box"><h3>📈 Messages (7 days)</h3><canvas id="messageChart"></canvas></div>
      <div class="chart-box"><h3>👤 New Users (7 days)</h3><canvas id="userChart"></canvas></div>
    </div>
    <div class="dashboard-grid">
      <div class="panel">
        <div class="panel-header"><h2>👤 Users</h2><span class="badge live">🔴 Live</span></div>
        <div id="usersList"><div class="loading">Loading users...</div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h2 id="panelTitle">💬 Recent Messages</h2><span class="badge live">🔴 Live</span></div>
        <div id="messagesContainer"><div class="loading">Loading messages...</div></div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    let token = localStorage.getItem('admin_token');
    let selectedUserId = null;
    let usersList = [];
    let socket = null;
    let messageChartInstance = null, userChartInstance = null;

    function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(el._timeout); el._timeout = setTimeout(() => el.classList.remove('show'), 4000); }
    const api = (url, options = {}) => { return fetch(url, { ...options, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(options.headers || {}) } }).then(res => { if (res.status === 401 || res.status === 403) { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = '/login'; throw new Error('Unauthorized'); } return res.json(); }); };
    function showError(msg) { const el = document.getElementById('errorMessage'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000); }
    function formatDate(dateStr) { if (!dateStr) return ''; return new Date(dateStr).toLocaleDateString('en-ZA', { day: '2-digit', month: 'short', year: 'numeric' }); }
    function exportChats() { window.open('/admin/export/messages', '_blank'); showToast('📥 Export started!'); }

    function loadStats() {
      api('/admin/stats').then(data => {
        document.getElementById('totalUsers').textContent = data.totalUsers || 0;
        document.getElementById('totalMessages').textContent = data.totalMessages || 0;
        document.getElementById('activeUsers').textContent = data.activeUsers7Days || 0;
        document.getElementById('bannedUsers').textContent = data.bannedUsers || 0;
        renderCharts(data.messageTrend || [], data.userTrend || []);
      }).catch(err => showError('Failed to load stats'));
    }

    function renderCharts(msgTrend, userTrend) {
      const msgLabels = msgTrend.map(d => d.date);
      const msgCounts = msgTrend.map(d => d.count);
      const userLabels = userTrend.map(d => d.date);
      const userCounts = userTrend.map(d => d.count);
      const msgCtx = document.getElementById('messageChart').getContext('2d');
      if (messageChartInstance) messageChartInstance.destroy();
      messageChartInstance = new Chart(msgCtx, { type: 'bar', data: { labels: msgLabels.length ? msgLabels : ['No data'], datasets: [{ label: 'Messages', data: msgCounts.length ? msgCounts : [0], backgroundColor: 'rgba(99,102,241,0.6)', borderColor: '#6366f1', borderWidth: 1 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
      const userCtx = document.getElementById('userChart').getContext('2d');
      if (userChartInstance) userChartInstance.destroy();
      userChartInstance = new Chart(userCtx, { type: 'line', data: { labels: userLabels.length ? userLabels : ['No data'], datasets: [{ label: 'New Users', data: userCounts.length ? userCounts : [0], backgroundColor: 'rgba(139,92,246,0.2)', borderColor: '#8b5cf6', borderWidth: 2, fill: true, tension: 0.3 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
    }

    function loadUsers() {
      const container = document.getElementById('usersList');
      container.innerHTML = '<div class="loading">Loading users...</div>';
      api('/admin/users').then(users => {
        usersList = users;
        if (users.length === 0) { container.innerHTML = '<div class="empty-state">No users found.</div>'; return; }
        container.innerHTML = users.map(u => `
          <div class="list-item" onclick="loadUserChats('${u.userid}')" title="Click to view chat history">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span class="email">${u.email || u.userid}</span>
              ${u.is_admin ? '<span class="badge-role admin">Admin</span>' : ''}
              ${u.is_banned ? '<span class="badge-role banned">🚫 Banned</span>' : ''}
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span class="date">${formatDate(u.created_at)}</span>
              <button class="btn-ban ${u.is_banned ? 'unban' : 'ban'}" onclick="event.stopPropagation();toggleBan('${u.userid}')">${u.is_banned ? 'Unban' : 'Ban'}</button>
            </div>
          </div>
        `).join('');
      }).catch(err => showError('Failed to load users'));
    }

    function loadGlobalMessages() {
      selectedUserId = null;
      const container = document.getElementById('messagesContainer');
      container.innerHTML = '<div class="loading">Loading messages...</div>';
      api('/admin/messages').then(messages => {
        if (messages.length === 0) { container.innerHTML = '<div class="empty-state">No messages yet.</div>'; return; }
        const recent = messages.slice(0, 50);
        container.innerHTML = recent.map(m => `
          <div style="padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:0.85rem;">
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <strong style="color:#6366f1;">${m.name || m.email}</strong>
              <span style="font-size:0.7rem;color:#6b7280;">${formatDate(m.created_at)}</span>
              <span style="font-size:0.65rem;background:#e5e7eb;padding:0 8px;border-radius:12px;">${m.role}</span>
            </div>
            <div style="color:#0b1120;margin-top:2px;word-wrap:break-word;">${m.content}</div>
          </div>
        `).join('');
        document.getElementById('panelTitle').textContent = '💬 Recent Messages';
      }).catch(err => showError('Failed to load messages'));
    }

    function loadUserChats(userId) {
      selectedUserId = userId;
      const container = document.getElementById('messagesContainer');
      container.innerHTML = `<button class="back-btn" onclick="loadGlobalMessages()">← Back to all messages</button><div class="loading">Loading user chat...</div>`;
      api(`/admin/user/${userId}/messages`).then(messages => {
        const user = usersList.find(u => u.userid === userId);
        const userName = user ? user.email || user.userid : userId;
        document.getElementById('panelTitle').textContent = `💬 Chats: ${userName}`;
        if (messages.length === 0) { container.innerHTML = `<button class="back-btn" onclick="loadGlobalMessages()">← Back to all messages</button><div class="empty-state">No messages from this user.</div>`; return; }
        const html = messages.map(m => `<div class="msg ${m.role}"><span class="role-label">${m.role === 'user' ? '👤 User' : '🤖 AI'}</span><div style="margin-top:2px;">${m.content}</div></div>`).join('');
        container.innerHTML = `<button class="back-btn" onclick="loadGlobalMessages()">← Back to all messages</button><div class="chat-view">${html}</div>`;
      }).catch(err => showError('Failed to load user messages'));
    }

    function toggleBan(userId) {
      if (!confirm('Toggle ban status for this user?')) return;
      api(`/admin/user/${userId}/toggle-ban`, { method: 'POST' }).then(() => { showToast('✅ User ban status updated'); loadUsers(); }).catch(err => showError('Failed to update ban status'));
    }

    function initSocket() {
      if (socket) return;
      socket = io({ path: '/socket.io' });
      socket.on('connect', () => console.log('🔌 Socket connected'));
      socket.on('new_message', (data) => { loadStats(); if (!selectedUserId) loadGlobalMessages(); showToast(`💬 New message from ${data.userId}`); });
      socket.on('user_banned', (data) => { showToast(`🚫 User ${data.userId} ${data.is_banned ? 'banned' : 'unbanned'}`); loadUsers(); loadStats(); });
      socket.on('disconnect', () => console.log('🔌 Socket disconnected'));
    }

    function init() {
      if (!localStorage.getItem('admin_token')) { window.location.href = '/login'; return; }
      token = localStorage.getItem('admin_token');
      api('/admin/users').then(() => {
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        document.getElementById('adminEmail').textContent = user.email || 'Admin';
        loadStats(); loadUsers(); loadGlobalMessages(); initSocket();
      }).catch(() => { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = '/login'; });
    }

    function logout() {
      if (confirm('Logout from admin?')) { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = '/login'; }
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
