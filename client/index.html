<!DOCTYPE html>
<html>
<head>
  <title>AI Teacher Platform</title>

  <style>
    body {
      font-family: Arial;
      max-width: 750px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    #chat {
      background: white;
      border-radius: 8px;
      height: 350px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    input, select, button {
      padding: 10px;
      width: 100%;
      margin-top: 5px;
      margin-bottom: 10px;
    }

    .user { color: blue; margin: 5px 0; }
    .bot { color: green; margin: 5px 0; }
  </style>
</head>

<body>

  <h2>📚 AI Teacher Platform</h2>

  <!-- PROFILE -->
  <div class="box">
    <h3>👤 Profile Setup</h3>

    <input id="name" placeholder="Your name" />

    <select id="country" onchange="updateSubjects()">
      <option value="">Select Country</option>
      <option value="South Africa">South Africa</option>
      <option value="Other">Other</option>
    </select>

    <select id="grade">
      <option value="">Select Grade</option>
      <option value="10">Grade 10</option>
      <option value="11">Grade 11</option>
      <option value="12">Grade 12</option>
    </select>

    <button onclick="saveProfile()">Save Profile</button>
  </div>

  <!-- SUBJECT -->
  <div class="box">
    <h3>📘 Subject Selection</h3>

    <select id="subject">
      <option value="English">English</option>
      <option value="Mathematics">Mathematics</option>
    </select>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <input id="input" placeholder="Ask your teacher..." />
  <button onclick="send()">Send</button>

  <script>
    let userId = localStorage.getItem("userId");

    if (!userId) {
      userId = "user-" + Math.random().toString(36).substring(2, 10);
      localStorage.setItem("userId", userId);
    }

    function updateSubjects() {
      const country = document.getElementById("country").value;
      const subject = document.getElementById("subject");

      subject.innerHTML = "";

      if (country === "South Africa") {
        subject.innerHTML += `
          <option>Mathematics</option>
          <option>English</option>
          <option>Physical Sciences</option>
          <option>Life Sciences</option>
          <option>Accounting</option>
          <option>Business Studies</option>
        `;
      } else {
        subject.innerHTML += `
          <option>English</option>
          <option>Pure Mathematics</option>
        `;
      }
    }

    async function saveProfile() {
      const name = document.getElementById("name").value;
      const country = document.getElementById("country").value;
      const grade = document.getElementById("grade").value;

      if (!name || !country) {
        alert("Please fill in name and country");
        return;
      }

      await fetch("http://localhost:5000/save-profile", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          userId,
          name,
          country,
          grade
        })
      });

      alert("Profile saved!");
    }

    async function send() {
      const input = document.getElementById("input");
      const chat = document.getElementById("chat");
      const subject = document.getElementById("subject").value;

      const message = input.value.trim();
      if (!message) return;

      chat.innerHTML += `<div class="user"><b>You:</b> [${subject}] ${message}</div>`;
      input.value = "";

      try {
        const res = await fetch("http://localhost:5000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: `[Subject: ${subject}] ${message}`,
            userId
          })
        });

        const data = await res.json();

        chat.innerHTML += `<div class="bot"><b>Teacher:</b> ${data.reply}</div>`;
      } catch (err) {
        chat.innerHTML += `<div class="bot" style="color:red;">Server not reachable</div>`;
      }

      chat.scrollTop = chat.scrollHeight;
    }
  </script>

</body>
</html>
