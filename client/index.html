<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 24px 80px rgba(0,0,0,0.08);
        }
        .logo { text-align:center; margin-bottom:24px; }
        .logo h1 { font-size:2.2rem; font-weight:800; color:#0b1120; }
        .logo h1 span { background:linear-gradient(135deg,#6366f1,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logo p { color:#6b7280; font-size:0.95rem; }
        h2 { font-size:1.4rem; font-weight:700; color:#0b1120; margin-bottom:4px; }
        .sub { color:#6b7280; font-size:0.95rem; margin-bottom:20px; }
        .field { margin-bottom:16px; }
        .field label { display:block; font-weight:600; font-size:0.85rem; color:#1f2937; margin-bottom:4px; }
        .field input, .field select {
            width:100%; padding:14px 16px; border:2px solid #e5e7eb; border-radius:12px;
            font-size:1rem; background:#fff; font-family:inherit;
        }
        .field input:focus, .field select:focus { outline:none; border-color:#6366f1; }
        .btn {
            width:100%; padding:15px; border:none; border-radius:12px; font-size:1rem;
            font-weight:700; cursor:pointer; background:linear-gradient(135deg,#6366f1,#8b5cf6);
            color:#fff; transition:transform 0.15s;
        }
        .btn:hover { transform:translateY(-2px); }
        .btn:disabled { opacity:0.6; cursor:not-allowed; }
        .auth-link { text-align:center; margin-top:16px; font-size:0.9rem; color:#6b7280; }
        .auth-link a { color:#6366f1; text-decoration:none; font-weight:600; cursor:pointer; }
        .auth-link a:hover { text-decoration:underline; }
        .error { color:#ef4444; font-size:0.85rem; margin-top:4px; display:none; }
        .error.show { display:block; }
        .success { color:#22c55e; font-size:0.85rem; margin-top:4px; display:none; }
        .success.show { display:block; }
        .spinner {
            display:inline-block; width:20px; height:20px; border:3px solid rgba(255,255,255,0.25);
            border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite;
            vertical-align:middle; margin-right:8px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card" id="app">
        <div class="logo">
            <h1>🧠 <span>Synapse</span></h1>
            <p>Your AI Tutor</p>
        </div>

        <!-- Login -->
        <div id="loginPage">
            <h2>Welcome back</h2>
            <p class="sub">Log in to continue learning.</p>
            <div class="field">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" />
            </div>
            <div class="error" id="loginError"></div>
            <div class="success" id="loginSuccess"></div>
            <button class="btn" id="loginBtn" onclick="login()">Log In</button>
            <div class="auth-link">
                Don't have an account? <a onclick="showSignup()">Sign up</a>
            </div>
        </div>

        <!-- Signup -->
        <div id="signupPage" style="display:none;">
            <h2>Create account</h2>
            <p class="sub">Join Synapse and start learning.</p>
            <div class="field">
                <label>Full name</label>
                <input type="text" id="signupName" placeholder="John Doe" />
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Min 6 characters" />
            </div>
            <div class="field">
                <label>Country</label>
                <select id="signupCountry">
                    <option value="South Africa">South Africa</option>
                    <option value="China">China</option>
                    <option value="United Kingdom">United Kingdom</option>
                    <option value="United States">United States</option>
                    <option value="Australia">Australia</option>
                    <option value="India">India</option>
                    <option value="Nigeria">Nigeria</option>
                    <option value="Kenya">Kenya</option>
                    <option value="Egypt">Egypt</option>
                    <option value="Germany">Germany</option>
                    <option value="France">France</option>
                    <option value="Japan">Japan</option>
                    <option value="Brazil">Brazil</option>
                    <option value="Canada">Canada</option>
                    <option value="New Zealand">New Zealand</option>
                </select>
            </div>
            <div class="field">
                <label>Role</label>
                <select id="signupRole">
                    <option value="learner">Learner</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <div class="error" id="signupError"></div>
            <div class="success" id="signupSuccess"></div>
            <button class="btn" id="signupBtn" onclick="signup()">Create Account</button>
            <div class="auth-link">
                Already have an account? <a onclick="showLogin()">Log in</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function showSignup() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('signupPage').style.display = 'block';
            clearErrors();
        }
        function showLogin() {
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('signupPage').style.display = 'none';
            clearErrors();
        }
        function clearErrors() {
            document.querySelectorAll('.error, .success').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
        }
        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
        }
        function showSuccess(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
        }
        function setButtonLoading(id, loading) {
            const btn = document.getElementById(id);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Loading...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.id === 'loginBtn' ? 'Log In' : 'Create Account';
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!email || !password) {
                showError('loginError', 'Please enter email and password');
                return;
            }
            clearErrors();
            setButtonLoading('loginBtn', true);
            try {
                const res = await fetch(API_BASE + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    showError('loginError', data.error || 'Login failed');
                    return;
                }
                if (data.success) {
                    localStorage.setItem('synapse_user', JSON.stringify(data.user));
                    showSuccess('loginSuccess', 'Login successful! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard.html', 1000);
                }
            } catch (err) {
                showError('loginError', 'Server error. Please try again.');
            } finally {
                setButtonLoading('loginBtn', false);
            }
        }

        async function signup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();
            const country = document.getElementById('signupCountry').value;
            const role = document.getElementById('signupRole').value;
            if (!name || !email || !password || !country) {
                showError('signupError', 'Please fill all fields');
                return;
            }
            if (password.length < 6) {
                showError('signupError', 'Password must be at least 6 characters');
                return;
            }
            clearErrors();
            setButtonLoading('signupBtn', true);
            try {
                const res = await fetch(API_BASE + '/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name, country, role })
                });
                const data = await res.json();
                if (!res.ok) {
                    showError('signupError', data.error || 'Signup failed');
                    return;
                }
                if (data.success) {
                    showSuccess('signupSuccess', 'Account created! Redirecting to login...');
                    setTimeout(() => {
                        showLogin();
                        document.getElementById('loginEmail').value = email;
                        showSuccess('loginSuccess', 'Account created! Please log in.');
                    }, 1500);
                }
            } catch (err) {
                showError('signupError', 'Server error. Please try again.');
            } finally {
                setButtonLoading('signupBtn', false);
            }
        }

        // Check if already logged in
        const storedUser = localStorage.getItem('synapse_user');
        if (storedUser) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
